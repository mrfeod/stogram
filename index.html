<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Stereogram Layered Viewer</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #1a1d24;
      --line: #2b3040;
      --text: #f5f7fa;
      --muted: #a6adbb;
      --accent: #7dd3fc
    }

    * {
      box-sizing: border-box
    }

    html,
    body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      font: 14px/1.35 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      color: var(--text)
    }

    #app {
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr
    }

    header {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      padding: 8px 10px;
      background: rgba(18, 20, 25, .94);
      border-bottom: 1px solid var(--line);
      z-index: 2
    }

    button,
    .file,
    .seg label {
      border: 1px solid var(--line);
      background: #20242d;
      color: var(--text);
      border-radius: 9px;
      padding: 7px 9px;
      cursor: pointer;
      min-width: 36px;
      text-align: center
    }

    button:hover,
    .file:hover,
    .seg label:hover {
      border-color: #4b5563
    }

    button.active {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(125, 211, 252, .25) inset;
      background: #1d2d35
    }

    input[type=file] {
      display: none
    }

    .seg {
      display: flex;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden
    }

    .seg label {
      border: 0;
      border-radius: 0;
      padding: 0
    }

    .seg input {
      display: none
    }

    .seg span {
      display: block;
      padding: 7px 9px;
      min-width: 34px;
      text-align: center
    }

    .seg input:checked+span {
      background: var(--accent);
      color: #05131a
    }

    .range {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted)
    }

    .check {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      padding: 2px 0
    }

    .check input {
      accent-color: var(--accent)
    }

    .fixed-hidden {
      display: none !important
    }

    input[type=range] {
      width: 92px
    }

    .num {
      width: 56px;
      padding: 4px 6px;
      border: 1px solid var(--line);
      background: #20242d;
      color: var(--text);
      border-radius: 8px
    }

    #progressOverlay {
      position: absolute;
      left: 50%;
      top: 22px;
      transform: translateX(-50%);
      z-index: 10;
      width: min(520px, calc(100% - 36px));
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(26, 29, 36, .94);
      box-shadow: 0 10px 32px rgba(0, 0, 0, .35);
      backdrop-filter: blur(10px);
      pointer-events: none
    }

    #progressOverlay[hidden] {
      display: none !important
    }

    #progressText {
      margin-bottom: 7px;
      color: var(--text);
      font-size: 13px
    }

    .progressTrack {
      height: 8px;
      overflow: hidden;
      border-radius: 999px;
      background: #303644
    }

    .progressFill {
      height: 100%;
      width: 0;
      background: var(--accent);
      border-radius: inherit;
      transition: width .12s linear
    }

    main {
      position: relative;
      min-height: 0
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none
    }

    #depthView {
      position: absolute;
      inset: 0;
      display: none;
      background: #090b0f;
      image-rendering: auto
    }

    #drop {
      position: absolute;
      inset: 22px;
      border: 2px dashed #3b4250;
      border-radius: 18px;
      display: grid;
      place-items: center;
      text-align: center;
      color: var(--muted);
      pointer-events: none
    }

    #drop[hidden] {
      display: none !important
    }

    #drop strong {
      display: block;
      color: var(--text);
      font-size: 22px;
      margin-bottom: 6px
    }

    #thumb {
      position: absolute;
      right: 12px;
      bottom: 12px;
      width: min(28vw, 240px);
      max-height: 28vh;
      object-fit: contain;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #000
    }

    .disabled {
      opacity: .45;
      pointer-events: none
    }

    #settingsPanel {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 8;
      width: min(390px, calc(100% - 24px));
      max-height: calc(100% - 24px);
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: rgba(26, 29, 36, .97);
      box-shadow: 0 12px 36px rgba(0, 0, 0, .4)
    }

    #settingsPanel[hidden] { display: none }
    .setting { display: grid; grid-template-columns: 22px 1fr 48px; gap: 7px; align-items: center; margin: 8px 0 }
    .setting input[type=range] { width: 100% }
    .setting output { color: var(--muted); text-align: right; font-variant-numeric: tabular-nums }
    .settingsTitle { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px }

    @media(max-width:860px) {
      header {
        gap: 6px;
        padding: 8px
      }

      .range {
        font-size: 12px
      }

      input[type=range] {
        width: 78px
      }

      .num {
        width: 58px;
        padding: 4px 6px;
        font-size: 12px
      }

      #thumb {
        width: 112px;
        bottom: 58px
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <header>
      <label class="file">＋<input id="file" type="file" accept="image/*"></label>
      <button id="analyze">↻</button>
      <button id="reset">⊕</button>
      <button id="auto">▶</button>
      <button id="settingsBtn" class="fixed-hidden" title="Настройки обработки depth map">⚙</button>

      <div class="seg">
        <label><input type="radio" name="shape" value="1" checked><span>◠</span></label>
        <label><input type="radio" name="shape" value="-1"><span>◡</span></label>
      </div>

      <div class="seg">
        <label><input type="radio" name="viewmode" value="surface" checked><span>△</span></label>
        <label><input type="radio" name="viewmode" value="layers"><span>≣</span></label>
        <label><input type="radio" name="viewmode" value="depthmap"><span>▥</span></label>
      </div>

      <label class="range">↕ <input id="depth" type="range" min="10" max="220" step="1" value="35"><input id="depthNum"
          class="num" type="number" step="1" value="35"></label>
      <label class="range fixed-hidden">Сетка <input id="quality" type="range" min="1" max="6" step="1" value="6"><input
          id="qualityNum" class="num" type="number" step="1" value="6"></label>
      <label class="range fixed-hidden">Гаусс <input id="gauss" type="range" min="0" max="100" step="0.1"
          value="3"><input id="gaussNum" class="num" type="number" step="0.1" value="3"></label>
      <label class="range depth-only fixed-hidden">Текстура <input id="texturePenalty" type="range" min="0" max="100"
          step="1" value="0"><input id="texturePenaltyNum" class="num" type="number" step="1" value="0"></label>
      <label class="range fixed-hidden">◌ <input id="blobMin" type="range" min="0" max="1" step="0.01"
          value="0.05"><input id="blobMinNum" class="num" type="number" step="0.01" value="0.05"></label>
      <label class="range">≣ <input id="layers" type="range" min="2" max="12" step="1" value="5"><input id="layersNum"
          class="num" type="number" step="1" value="5"></label>
      <label class="range">↔ <input id="period" type="range" min="1" max="720" step="1" value="90"><input id="periodNum"
          class="num" type="number" step="1" value="90"></label>
      <label class="range fixed-hidden">∩ <input id="meshSmooth" type="range" min="0" max="100" step="1"
          value="60"><input id="meshSmoothNum" class="num" type="number" step="1" value="60"></label>
    </header>
    <main>
      <aside id="settingsPanel" hidden>
        <div class="settingsTitle"><strong>Обработка depth map</strong><button id="settingsClose">×</button></div>
        <label class="setting"><input id="pipeSpeckles" type="checkbox" checked><span>Удаление островков</span><output></output></label>
        <label class="setting"><span></span><input id="speckleSize" type="range" min="0" max="1000" step="5" value="200"><output></output></label>
        <label class="setting"><input id="pipeFill" type="checkbox" checked><span>Заполнение дыр</span><output></output></label>
        <label class="setting"><span></span><input id="fillRadius" type="range" min="1" max="12" step="1" value="8"><output></output></label>
        <label class="setting"><input id="pipeMedian" type="checkbox" checked><span>Weighted median</span><output></output></label>
        <label class="setting"><span></span><input id="medianRadius" type="range" min="1" max="12" step="1" value="8"><output></output></label>
      </aside>
      <canvas id="view"></canvas>
      <canvas id="depthView"></canvas>
      <div id="progressOverlay" hidden>
        <div id="progressText">0%</div>
        <div class="progressTrack">
          <div id="progressBar" class="progressFill"></div>
        </div>
      </div>
      <div id="drop">
        <div><strong>＋</strong></div>
      </div>
      <img id="thumb" hidden alt="Исходная стереограмма">
    </main>
  </div>
  <script>
    'use strict';
    const $ = s => document.querySelector(s);
    const cv = $('#view'), depthCv = $('#depthView'), depthCtx = depthCv.getContext('2d'), fi = $('#file'), drop = $('#drop'), thumb = $('#thumb'), progressOverlay = $('#progressOverlay'), progressText = $('#progressText'), progressBar = $('#progressBar');
    const depthR = $('#depth'), depthN = $('#depthNum'), qualityR = $('#quality'), qualityN = $('#qualityNum');
    const gaussR = $('#gauss'), gaussN = $('#gaussNum'), textureR = $('#texturePenalty'), textureN = $('#texturePenaltyNum'), blobR = $('#blobMin'), blobN = $('#blobMinNum');
    const layersR = $('#layers'), layersN = $('#layersNum');
    const periodR = $('#period'), periodN = $('#periodNum');
    const meshSmoothR = $('#meshSmooth'), meshSmoothN = $('#meshSmoothNum');
    const autoBtn = $('#auto');
    const pipelineIds = ['speckleSize', 'fillRadius', 'medianRadius'];
    const gl = cv.getContext('webgl2', { alpha: false, antialias: true, powerPreference: 'high-performance' });
    if (!gl) { alert('Нужен WebGL2'); throw new Error('WebGL2 unavailable'); }

    let img = null;
    let mapW = 0, mapH = 0, cropX = 0, bgDepth = .5;
    let colorMap = null, grayMap = null, confMap = null, rawDepth = null, processedDepth = null, cleanDepthMap = null, depthPreview = null, depthPreviewW = 0, depthPreviewH = 0;
    let yaw = -.22, pitch = -.16, zoom = 1, drag = false, lastX = 0, lastY = 0, pinch = 0;
    let autoRotate = false, autoPauseUntil = 0, lastFrame = performance.now(), dirty = true, autoTime = 0, autoBaseYaw = -.22, autoBasePitch = -.16;
    let meshIndexCount = 0, meshTimer = 0, processTimer = 0, disparityWorker = null, analysisJob = 0;
    let meshSourceBounds = { minX: -1, maxX: 1, minY: -1, maxY: 1, minD: 0, maxD: 0 };
    const CAMERA_LIGHT_X = -0.28, CAMERA_LIGHT_Y = 0.22, CAMERA_LIGHT_Z = 1.0;

    function cleanupOptions() {
      return { maskSmooth: false, fillHoles: false, inpaint: false, bilateral: false };
    }

    function status(_s) { }
    function setProgress(value, _label) {
      const v = Math.max(0, Math.min(1, Number(value) || 0));
      progressOverlay.hidden = false;
      progressBar.style.width = (v * 100).toFixed(1) + '%';
      progressText.textContent = (v * 100).toFixed(0) + '%';
    }
    function hideProgress() { progressOverlay.hidden = true; progressBar.style.width = '0%'; }
    function nextFrame() { return new Promise(resolve => requestAnimationFrame(() => resolve())); }
    function disparityWorkerMain() {
      'use strict';
      function postProgress(id, value, label) { postMessage({ type: 'progress', id, value, label }); }
      function percentile(arr, p) { if (!arr.length) return 0; const i = Math.max(0, Math.min(arr.length - 1, Math.floor((arr.length - 1) * p))); return arr[i]; }
      function smoothstep(a, b, x) { const t = Math.max(0, Math.min(1, (x - a) / Math.max(1e-6, b - a))); return t * t * (3 - 2 * t); }
      function sort9(a) {
        for (let i = 1; i < 9; i++) { const v = a[i]; let j = i - 1; while (j >= 0 && a[j] > v) { a[j + 1] = a[j]; j--; } a[j + 1] = v; }
      }
      function sortN(a, n) {
        for (let i = 1; i < n; i++) { const v = a[i]; let j = i - 1; while (j >= 0 && a[j] > v) { a[j + 1] = a[j]; j--; } a[j + 1] = v; }
      }
      function popcount32(v) {
        v -= (v >>> 1) & 0x55555555;
        v = (v & 0x33333333) + ((v >>> 2) & 0x33333333);
        return (((v + (v >>> 4)) & 0x0f0f0f0f) * 0x01010101) >>> 24;
      }
      function robustDepthClean(base, conf, w, h, bg, cropX, id) {
        let cur = base.slice();
        const vals = new Float32Array(9), devs = new Float32Array(9);
        for (let pass = 0; pass < 2; pass++) {
          const out = cur.slice();
          for (let y = 1; y < h - 1; y++) {
            for (let x = Math.max(cropX + 1, 1); x < w - 1; x++) {
              const i = y * w + x; let k = 0;
              for (let yy = -1; yy <= 1; yy++) for (let xx = -1; xx <= 1; xx++) vals[k++] = cur[(y + yy) * w + x + xx];
              sort9(vals); const med = vals[4];
              for (k = 0; k < 9; k++) devs[k] = Math.abs(vals[k] - med);
              sort9(devs); const mad = devs[4];
              const center = cur[i], dev = Math.abs(center - med), cf = Math.max(0, Math.min(1, conf[i] || 0));
              const th = .010 + 2.8 * mad + (1 - cf) * .025;
              let v = center; if (dev > th) v = med * .80 + center * .20;
              const delta = v - bg, sep = Math.abs(delta);
              const keep = smoothstep(.028, .11, sep) * (.45 + .55 * smoothstep(.015, .08, cf));
              out[i] = Math.max(0, Math.min(1, bg + delta * (.14 + .86 * keep)));
            }
            if ((y & 63) === 0) postProgress(id, .88 + pass * .045 + (y / h) * .04, 'Очистка глубины…');
          }
          cur = out;
        }
        return cur;
      }
      onmessage = e => {
        const { id, grayBuffer, w, h, p } = e.data;
        const gray = new Float32Array(grayBuffer);
        const maxDisp = Math.max(4, Math.min(Math.floor(p * .34), 42));
        const minDisp = -Math.max(2, Math.floor(p * .08));
        const dispCount = maxDisp - minDisp + 1;
        const xStart = p + maxDisp + 3, xEnd = w - 3, validW = Math.max(1, xEnd - xStart);
        const pixels = validW * h, census = new Uint32Array(w * h);
        // 5x5 Census descriptor: local ordering is much less sensitive to the source texture brightness.
        for (let y = 2; y < h - 2; y++) for (let x = 2; x < w - 2; x++) {
          const center = gray[y * w + x]; let bits = 0, bit = 0;
          for (let yy = -2; yy <= 2; yy++) for (let xx = -2; xx <= 2; xx++) {
            if (xx === 0 && yy === 0) continue;
            if (gray[(y + yy) * w + x + xx] < center) bits |= (1 << bit);
            bit++;
          }
          census[y * w + x] = bits >>> 0;
        }
        const costs = new Uint8Array(pixels * dispCount);
        for (let y = 0; y < h; y++) for (let vx = 0; vx < validW; vx++) {
          const x = xStart + vx, pi = y * validW + vx, a = census[y * w + x];
          for (let di = 0; di < dispCount; di++) {
            const d = minDisp + di, qx = x - (p - d), b = census[y * w + qx];
            const censusCost = popcount32(a ^ b);
            const intensityCost = Math.min(8, Math.abs(gray[y * w + x] - gray[y * w + qx]) / 12);
            costs[pi * dispCount + di] = Math.min(31, Math.round(censusCost + intensityCost));
          }
          if ((y & 63) === 0 && vx === 0) postProgress(id, .10 + .18 * y / h, 'Census cost volume…');
        }
        const aggregate = new Uint16Array(costs.length);
        const prev = new Float32Array(dispCount), cur = new Float32Array(dispCount);
        function addPath(startX, startY, dx, dy) {
          let vx = startX, y = startY, first = true;
          while (vx >= 0 && vx < validW && y >= 0 && y < h) {
            const pi = y * validW + vx, off = pi * dispCount;
            if (first) {
              for (let di = 0; di < dispCount; di++) { cur[di] = costs[off + di]; aggregate[off + di] += cur[di]; }
              first = false;
            } else {
              let prevMin = prev[0]; for (let di = 1; di < dispCount; di++) if (prev[di] < prevMin) prevMin = prev[di];
              const px = xStart + vx - dx, py = y - dy;
              const edge = Math.abs(gray[y * w + xStart + vx] - gray[py * w + px]);
              const p1 = 2.2, p2 = Math.max(5, 18 - edge * .20);
              for (let di = 0; di < dispCount; di++) {
                let v = prev[di];
                if (di > 0) v = Math.min(v, prev[di - 1] + p1);
                if (di + 1 < dispCount) v = Math.min(v, prev[di + 1] + p1);
                v = Math.min(v, prevMin + p2);
                cur[di] = costs[off + di] + v - prevMin;
                aggregate[off + di] = Math.min(65535, aggregate[off + di] + Math.round(cur[di]));
              }
            }
            prev.set(cur); vx += dx; y += dy;
          }
        }
        // Four SGM directions. Each path favours piecewise-smooth disparity but relaxes at image edges.
        for (let y = 0; y < h; y++) { addPath(0, y, 1, 0); addPath(validW - 1, y, -1, 0); }
        postProgress(id, .48, 'SGM по горизонтали…');
        for (let vx = 0; vx < validW; vx++) { addPath(vx, 0, 0, 1); addPath(vx, h - 1, 0, -1); }
        postProgress(id, .70, 'SGM по вертикали…');
        const raw = new Float32Array(w * h), conf = new Float32Array(w * h);
        for (let y = 0; y < h; y++) for (let vx = 0; vx < validW; vx++) {
          const off = (y * validW + vx) * dispCount; let bestD = 0, best = Infinity, second = Infinity;
          for (let di = 0; di < dispCount; di++) {
            const v = aggregate[off + di];
            if (v < best) { best = v; bestD = di; }
          }
          for (let di = 0; di < dispCount; di++) if (Math.abs(di - bestD) > 1 && aggregate[off + di] < second) second = aggregate[off + di];
          const i = y * w + xStart + vx; raw[i] = minDisp + bestD;
          conf[i] = Math.max(0, Math.min(1, (second - best) / Math.max(8, second)));
        }
        for (let y = 0; y < h; y++) {
          const src = y * w + xStart;
          for (let x = 0; x < xStart; x++) { raw[y * w + x] = raw[src]; conf[y * w + x] = conf[src] * .5; }
          for (let x = xEnd; x < w; x++) { raw[y * w + x] = raw[y * w + xEnd - 1]; conf[y * w + x] = conf[y * w + xEnd - 1] * .5; }
        }
        let t = raw, c = conf;
        const vals = new Float32Array(25);
        for (let pass = 0; pass < 2; pass++) {
          const out = t.slice(), outC = c.slice();
          const radius = pass === 0 ? 2 : 1;
          for (let y = radius; y < h - radius; y++) {
            for (let x = Math.max(xStart, radius); x < w - radius; x++) {
              let k = 0;
              for (let yy = -radius; yy <= radius; yy++) for (let xx = -radius; xx <= radius; xx++) vals[k++] = t[(y + yy) * w + x + xx];
              sortN(vals, k);
              const median = vals[k >> 1], i = y * w + x;
              let weight = 0, sum = 0, support = 0;
              for (let yy = -radius; yy <= radius; yy++) for (let xx = -radius; xx <= radius; xx++) {
                const j = (y + yy) * w + x + xx, delta = Math.abs(t[j] - median);
                if (delta <= 2.25) {
                  const ww = .15 + Math.min(1, c[j] * 5);
                  sum += t[j] * ww; weight += ww; support += Math.min(1, c[j] * 5);
                }
              }
              const consensus = weight > 0 ? sum / weight : median;
              const ownConfidence = Math.max(0, Math.min(1, c[i] * 4));
              const blend = .82 - ownConfidence * .62;
              // Do not smear a strong, well-supported depth edge into its neighbour.
              out[i] = ownConfidence > .65 && Math.abs(t[i] - median) > 2.5 ? t[i] : t[i] * (1 - blend) + consensus * blend;
              outC[i] = Math.min(1, c[i] * .55 + (support / k) * .45);
            }
            if ((y & 63) === 0) postProgress(id, .74 + pass * .045 + (y / h) * .04, 'Заполнение ненадёжных областей…');
          }
          t = out; c = outC;
        }
        const samples = [];
        for (let y = 4; y < h - 4; y += 3)for (let x = 4; x < w - 4; x += 3)samples.push(t[y * w + x]);
        samples.sort((a, b) => a - b);
        const lo = percentile(samples, .05), hi = percentile(samples, .95), inv = 1 / Math.max(1e-6, hi - lo);
        let rawDepth = new Float32Array(w * h), confMap = new Float32Array(w * h);
        const bins = new Uint32Array(64);
        for (let i = 0; i < t.length; i++) {
          const v = Math.max(0, Math.min(1, (t[i] - lo) * inv)); rawDepth[i] = v; confMap[i] = Math.max(0, Math.min(1, c[i] * 4)); bins[Math.max(0, Math.min(63, (v * 63) | 0))]++;
        }
        let bi = 0; for (let i = 1; i < 64; i++)if (bins[i] > bins[bi]) bi = i;
        const bgDepth = bi / 63, cropX = Math.max(0, Math.min(w - 1, xStart));
        rawDepth = robustDepthClean(rawDepth, confMap, w, h, bgDepth, cropX, id);
        postMessage({ type: 'done', id, bgDepth, cropX, rawDepth: rawDepth.buffer, confMap: confMap.buffer }, [rawDepth.buffer, confMap.buffer]);
      };
    }
    function createDisparityWorker() {
      const src = '(' + disparityWorkerMain.toString() + ')()';
      return new Worker(URL.createObjectURL(new Blob([src], { type: 'text/javascript' })));
    }
    function currentShape() { return +document.querySelector('input[name="shape"]:checked').value; }
    function currentViewMode() { return document.querySelector('input[name="viewmode"]:checked').value; }
    function clampSliderValue(el, v) {

          for (let yy = Math.max(0, vy - 1); yy <= Math.min(h - 1, vy + 1); yy++) for (let xx = Math.max(cropX, vx - 1); xx <= Math.min(w - 1, vx + 1); xx++) {
            const n = yy * w + xx;
            if (out[n] && !seen[n]) { seen[n] = 1; queue[tail++] = n; }
          }
        }
        if (tail < minSize) for (let i = 0; i < tail; i++) out[queue[i]] = 0;
      }
      return out;
    }
    function suppressDepthSpikes(src, surfaceMask, w, h, maxSize) {
      if (maxSize < 1) return src.slice();
      const medianMap = new Float32Array(src.length), spikeMask = new Uint8Array(src.length);
      const values = new Float32Array(9), deviations = new Float32Array(9);
      for (let y = 1; y < h - 1; y++) for (let x = Math.max(cropX + 1, 1); x < w - 1; x++) {
        const i = y * w + x; if (!surfaceMask[i]) continue;
        let n = 0;
        for (let yy = -1; yy <= 1; yy++) for (let xx = -1; xx <= 1; xx++) {
          const j = (y + yy) * w + x + xx;
          if (surfaceMask[j]) values[n++] = src[j];
        }
        if (n < 4) continue;
        for (let a = 1; a < n; a++) { const v = values[a]; let b = a - 1; while (b >= 0 && values[b] > v) { values[b + 1] = values[b]; b--; } values[b + 1] = v; }

        for (let a = 0; a < n; a++) deviations[a] = Math.abs(values[a] - median);
        for (let a = 1; a < n; a++) { const v = deviations[a]; let b = a - 1; while (b >= 0 && deviations[b] > v) { deviations[b + 1] = deviations[b]; b--; } deviations[b + 1] = v; }
        const mad = deviations[n >> 1], threshold = .010 + mad * 3.2;

      }
      const out = src.slice(), seen = new Uint8Array(src.length), queue = new Int32Array(src.length);
      for (let y = 1; y < h - 1; y++) for (let x = Math.max(cropX + 1, 1); x < w - 1; x++) {
        const start = y * w + x; if (!spikeMask[start] || seen[start]) continue;

      const weights = new Float32Array(surfaceMask.length);
      for (let i = 0; i < weights.length; i++) weights[i] = surfaceMask[i] ? 1 : 0;
      // Normalized convolution averages only other surface pixels, never the black background.
      const interpolated = weightedGaussian(src, weights, w, h, Math.max(1, radius * .55));
      const out = src.slice();
      for (let i = 0; i < out.length; i++) if (surfaceMask[i] && !inner[i] && interpolated[i] > 0) out[i] = interpolated[i];

    }
    function weightedGaussian(values, weights, w, h, sigma) {
      const num = new Float32Array(values.length);
      for (let i = 0; i < values.length; i++)num[i] = values[i] * weights[i];
      const bNum = gaussianBlur(num, w, h, sigma), bDen = gaussianBlur(weights, w, h, sigma), out = new Float32Array(values.length);

    }
    function pipelineValue(id) { return +$('#' + id).value || 0; }
    function weightedMedianDepth(src, mask, confidence, guide, w, h, radius) {
      const out = src.slice(), sampleStep = Math.max(1, Math.ceil(radius / 3));
      const samplesPerAxis = Math.floor(radius * 2 / sampleStep) + 1, maxN = samplesPerAxis ** 2;
      const values = new Float32Array(maxN), weights = new Float32Array(maxN);
      const guideScale = 20;
      for (let y = radius; y < h - radius; y++) for (let x = Math.max(cropX + radius, radius); x < w - radius; x++) {
        const i = y * w + x; if (!mask[i]) continue;
        let n = 0, totalWeight = 0;
        for (let yy = -radius; yy <= radius; yy += sampleStep) for (let xx = -radius; xx <= radius; xx += sampleStep) {
          const j = (y + yy) * w + x + xx; if (!mask[j] || src[j] <= 0) continue;
          const spatial = 1 / (1 + xx * xx + yy * yy);
          const edge = guide ? Math.exp(-Math.abs(guide[j] - guide[i]) / guideScale) : 1;
          values[n] = src[j]; weights[n] = spatial * edge * (.15 + (confidence ? confidence[j] : 1)); totalWeight += weights[n]; n++;
        }
        for (let a = 1; a < n; a++) {
          const v = values[a], ww = weights[a]; let b = a - 1;
          while (b >= 0 && values[b] > v) { values[b + 1] = values[b]; weights[b + 1] = weights[b]; b--; }
          values[b + 1] = v; weights[b + 1] = ww;
        }

    }
    function rebuildDepthPreview() {
      depthPreview = null; depthPreviewW = 0; depthPreviewH = 0; cleanDepthMap = null;
      if (!processedDepth || !grayMap || !mapW || !mapH) return;

      const w = mapW, h = mapH, shape = currentShape();
      const signed = new Float32Array(w * h), positives = [];
      for (let y = 0; y < h; y++) for (let x = cropX; x < w; x++) {
        const i = y * w + x;
        const s = Math.max(0, processedDepth[i] - bgDepth);
        signed[i] = s;
        if ((x & 1) === 0 && (y & 1) === 0 && s > 0) positives.push(s);
      }
      positives.sort((a, b) => a - b);
      const depthNoiseFloor = positives.length ? Math.max(.004, percentile(positives, .10) * .65) : .008;
      let mask = new Uint8Array(w * h);
      for (let y = 0; y < h; y++) for (let x = cropX; x < w; x++) {
        const i = y * w + x;
        mask[i] = signed[i] > depthNoiseFloor ? 1 : 0;
      }
      if ($('#pipeSpeckles').checked) mask = removeSmallComponents(mask, w, h, Math.round(pipelineValue('speckleSize')));

      let clean = new Float32Array(w * h);
      for (let i = 0; i < clean.length; i++) if (mask[i]) clean[i] = signed[i];
      if ($('#pipeFill').checked) {
        const radius = Math.round(pipelineValue('fillRadius'));
        const closed = erodeMask(dilateMask(mask, w, h, radius), w, h, radius);
        const weights = new Float32Array(mask.length);
        for (let i = 0; i < weights.length; i++) weights[i] = mask[i] ? (.1 + (confMap ? confMap[i] : 1)) : 0;
        const filled = weightedGaussian(signed, weights, w, h, Math.max(1, radius));
        for (let i = 0; i < clean.length; i++) if (closed[i]) { if (!mask[i]) clean[i] = filled[i]; mask[i] = 1; }
      }
      if ($('#pipeSpeckles').checked) clean = suppressDepthSpikes(clean, mask, w, h, Math.round(pipelineValue('speckleSize')));
      clean = smoothDepthBoundary(clean, mask, w, h, 10);
      if ($('#pipeMedian').checked) clean = weightedMedianDepth(clean, mask, confMap, null, w, h, Math.round(pipelineValue('medianRadius')));

      const nz = [];
      for (let y = 0; y < h; y += 2) for (let x = cropX; x < w; x += 2) { const v = clean[y * w + x]; if (v > .0005) nz.push(v); }
      nz.sort((a, b) => a - b);
      const hi = nz.length ? Math.max(.02, percentile(nz, .985)) : 1, inv = 1 / Math.max(1e-6, hi);
      cleanDepthMap = new Float32Array(w * h);
      const srcW = Math.max(1, w - cropX), srcH = h;
      const imgData = depthCtx.createImageData(srcW, srcH);
      let o = 0;
      for (let y = 0; y < h; y++) for (let x = cropX; x < w; x++) {
        const lin = Math.max(0, Math.min(1, clean[y * w + x] * inv));
        cleanDepthMap[y * w + x] = lin;
        const shown = (shape > 0 || lin <= 0) ? lin : (1 - lin);
        const t = Math.pow(shown, .82);

    function renderDepthMap() {

      }

      tmp.width = depthPreviewW; tmp.height = depthPreviewH;
      tmp.getContext('2d').putImageData(depthPreview, 0, 0);

      depthCtx.fillStyle = '#090b0f'; depthCtx.fillRect(0, 0, depthCv.width, depthCv.height);
      const scale = Math.min(depthCv.width / depthPreviewW, depthCv.height / depthPreviewH) * .92;
      const dw = Math.max(1, depthPreviewW * scale), dh = Math.max(1, depthPreviewH * scale);
      const dx = (depthCv.width - dw) / 2, dy = (depthCv.height - dh) / 2;
      depthCtx.imageSmoothingEnabled = true;
      depthCtx.drawImage(tmp, dx, dy, dw, dh);
    }

    function render() {
      if (currentViewMode() === 'depthmap') { renderDepthMap(); return; }
      if (!processedDepth || !meshIndexCount) return;
      const lightVP = computeLightVP();
      renderShadowMap(lightVP);
      renderGBuffer();
      gl.bindFramebuffer(gl.FRAMEBUFFER, null);
      gl.viewport(0, 0, cv.width, cv.height);
      gl.disable(gl.DEPTH_TEST);
      gl.clearColor(.045, .05, .06, 1);
      gl.clear(gl.COLOR_BUFFER_BIT);

      gl.activeTexture(gl.TEXTURE0); gl.bindTexture(gl.TEXTURE_2D, gAlbedoTex); gl.uniform1i(LU.albedo, 0);
      gl.activeTexture(gl.TEXTURE1); gl.bindTexture(gl.TEXTURE_2D, gNormalTex); gl.uniform1i(LU.normal, 1);
      gl.activeTexture(gl.TEXTURE2); gl.bindTexture(gl.TEXTURE_2D, gPositionTex); gl.uniform1i(LU.position, 2);
      gl.activeTexture(gl.TEXTURE3); gl.bindTexture(gl.TEXTURE_2D, shadowTex); gl.uniform1i(LU.shadowTex, 3);
      gl.uniform2f(LU.shadowTexel, 1 / shadowSize, 1 / shadowSize);
      gl.uniformMatrix4fv(LU.lightVP, false, lightVP);
      gl.uniform3f(LU.lightDir, ld.x, ld.y, ld.z);
      gl.uniform3f(LU.cameraPos, 0, 0, 3.2);
      gl.uniform1f(LU.ambient, lp.ambient); gl.uniform1f(LU.diffuse, lp.diffuse); gl.uniform1f(LU.fill, lp.fill);
      gl.uniform1f(LU.shadowStrength, lp.shadowStrength); gl.uniform1f(LU.selfShade, lp.selfShade); gl.uniform1f(LU.specular, lp.specular);
      gl.uniform1f(LU.shininess, lp.shininess); gl.uniform1f(LU.biasBase, lp.biasBase); gl.uniform1f(LU.biasSlope, lp.biasSlope); gl.uniform1f(LU.pcfRadius, lp.pcfRadius); gl.uniform1f(LU.shadowHardness, lp.shadowHardness);

      gl.bindVertexArray(null);
      gl.enable(gl.DEPTH_TEST);
    }

    // UI events
    let pipelineTimer = 0;
    const refreshPipeline = () => {
      clearTimeout(pipelineTimer);
      pipelineTimer = setTimeout(() => { if (!processedDepth) return; rebuildDepthPreview(); buildMesh(); sched(); }, 120);
    };
    $('#settingsBtn').onclick = () => { $('#settingsPanel').hidden = !$('#settingsPanel').hidden; };
    $('#settingsClose').onclick = () => { $('#settingsPanel').hidden = true; };
    pipelineIds.forEach(id => {
      const el = $('#' + id), output = el.parentElement.querySelector('output');
      const show = () => { output.textContent = el.value; };
      el.addEventListener('input', () => { show(); refreshPipeline(); }); show();

    ['pipeSpeckles', 'pipeFill', 'pipeMedian'].forEach(id => $('#' + id).addEventListener('change', refreshPipeline));
    syncPair(depthR, depthN); syncPair(qualityR, qualityN); syncPair(gaussR, gaussN); syncPair(textureR, textureN); syncPair(blobR, blobN); syncPair(layersR, layersN); syncPair(periodR, periodN); syncPair(meshSmoothR, meshSmoothN);
    setPair(qualityR, qualityN, 6);
    setPair(textureR, textureN, 0);
    setPair(blobR, blobN, 0.05);
    setPair(gaussR, gaussN, 3);
    setPair(meshSmoothR, meshSmoothN, 60);
    setPair(depthR, depthN, 35);
    updateAutoButton();
    $('#reset').onclick = resetCamera;
    autoBtn.onclick = () => { autoRotate = !autoRotate; updateAutoButton(); if (autoRotate) { autoBaseYaw = yaw; autoBasePitch = pitch; autoTime = 0; autoPauseUntil = 0; } sched(); };
    $('#analyze').onclick = () => analyze().catch(err => { console.error(err); hideProgress(); });
    fi.onchange = () => fi.files[0] && loadImage(fi.files[0]);
    ['dragenter', 'dragover'].forEach(n => addEventListener(n, e => e.preventDefault()));
    addEventListener('drop', e => { e.preventDefault(); const f = e.dataTransfer.files[0]; if (f && f.type.startsWith('image/')) loadImage(f); });
    periodR.onchange = () => {
      if (!grayMap || !mapW || !mapH) return;
      recoverDepth(grayMap, mapW, mapH, +periodR.value).catch(err => { console.error(err); hideProgress(); });
    };
    depthR.oninput = sched; gaussR.oninput = reprocess; textureR.oninput = () => { rebuildDepthPreview(); if (currentViewMode() !== 'layers') buildMesh(); sched(); }; blobR.oninput = () => { rebuildDepthPreview(); if (currentViewMode() !== 'layers') buildMesh(); sched(); }; layersR.oninput = reprocess;
    qualityR.oninput = () => { clearTimeout(meshTimer); meshTimer = setTimeout(() => { buildMesh(); sched(); }, 50); };
    document.querySelectorAll('input[name="shape"]').forEach(el => el.onchange = () => { rebuildDepthPreview(); if (currentViewMode() !== 'depthmap') buildMesh(); sched(); });
    document.querySelectorAll('input[name="viewmode"]').forEach(el => el.onchange = () => { updateLayerUi(); reprocess(); sched(); });
    meshSmoothR.oninput = () => { if (currentViewMode() !== 'depthmap') buildMesh(); sched(); };
    meshSmoothR.onchange = meshSmoothR.oninput;

    // pointer controls
    cv.addEventListener('pointerdown', e => { disableAutoRotate(); drag = true; pauseAuto(); lastX = e.clientX; lastY = e.clientY; cv.setPointerCapture(e.pointerId); });
    cv.addEventListener('pointermove', e => { if (!drag) return; yaw += (e.clientX - lastX) * .008; pitch = Math.max(-1.35, Math.min(1.35, pitch + (e.clientY - lastY) * .008)); lastX = e.clientX; lastY = e.clientY; sched(); });
    ['pointerup', 'pointercancel'].forEach(n => cv.addEventListener(n, () => { drag = false; autoBaseYaw = yaw; autoBasePitch = pitch; pauseAuto(); }));
    cv.addEventListener('wheel', e => { e.preventDefault(); pauseAuto(); zoom = Math.max(.35, Math.min(4, zoom * Math.exp(-e.deltaY * .001))); sched(); }, { passive: false });
    cv.addEventListener('touchstart', e => { disableAutoRotate(); if (e.touches.length === 2) pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); }, { passive: true });
    cv.addEventListener('touchmove', e => { if (e.touches.length === 2) { const p = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY); if (pinch) zoom = Math.max(.35, Math.min(4, zoom * p / pinch)); pinch = p; pauseAuto(); sched(); } }, { passive: true });
    cv.addEventListener('touchend', () => { pinch = 0; autoBaseYaw = yaw; autoBasePitch = pitch; pauseAuto(); });
    cv.ondblclick = resetCamera;

    resize();
    loadRandomStartupImage();
  </script>
