<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Stogram: Stereogram Viewer</title>
  <meta name="description" content="Reconstruct depth maps from autostereograms and explore them as 3D surfaces or layers.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Stogram: Stereogram Viewer">
  <meta property="og:description" content="Reconstruct depth maps from autostereograms and explore them as 3D surfaces or layers.">
  <meta property="og:url" content="https://mrfeod.github.io/stogram/">
  <meta property="og:image" content="https://mrfeod.github.io/stogram/src/social-preview.png">
  <meta property="og:image:width" content="1280">
  <meta property="og:image:height" content="640">
  <meta property="og:image:alt" content="Stogram stereogram depth reconstruction and 3D viewer">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Stogram: Stereogram Viewer">
  <meta name="twitter:description" content="Reconstruct depth maps from autostereograms and explore them as 3D surfaces or layers.">
  <meta name="twitter:image" content="https://mrfeod.github.io/stogram/src/social-preview.png">
  <link rel="icon" href="src/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="src/favicon/apple-touch-icon.png">
  <link rel="manifest" href="src/favicon/site.webmanifest">
  <meta name="theme-color" content="#101114">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="stylesheet" href="src/styles.css">
</head>

<body>
  <div id="app">
    <header>
      <label id="sourceButton" class="file">＋<input id="file" type="file" accept="image/*"></label>
      <label id="textureButton" class="file">▧<input id="textureFile" type="file" accept="image/*"></label>
      <button id="analyze">↻</button>
      <button id="reset">⊕</button>
      <button id="auto">▶</button>

      <div class="seg">
        <label title="Eye view"><input type="radio" name="viewmode" value="eye" checked><span>◉</span></label>
        <label title="Layers"><input type="radio" name="viewmode" value="layers"><span>≡</span></label>
        <label title="3D"><input type="radio" name="viewmode" value="surface"><span>❍</span></label>
        <label title="Depth map"><input type="radio" name="viewmode" value="depthmap"><span>◩</span></label>
      </div>

      <div class="seg">
        <label><input type="radio" name="shape" value="1" checked><span>◠</span></label>
        <label><input type="radio" name="shape" value="-1"><span>◡</span></label>
      </div>

      <label id="depthControl" class="range" hidden>↕︎ <input id="depth" type="range" min="0" max="100" step="1" value="35"><input id="depthNum"
          class="num" type="number" min="0" max="100" step="1" value="35"></label>
      <label id="dofStrengthControl" class="range">↕︎ <input id="dofStrength" type="range" min="0" max="100" step="1" value="35"><input id="dofStrengthNum"
          class="num" type="number" min="0" max="100" step="1" value="35"></label>
      <label class="range" hidden>≡ <input id="layers" type="range" min="16" max="16" step="1" value="16"><input id="layersNum"
          class="num" type="number" step="1" value="16"></label>
      <label class="range" hidden>✂ <input id="fragmentCleanup" type="range" min="2" max="2" step="1" value="2"><input id="fragmentCleanupNum"
          class="num" type="number" step="1" value="2"></label>
      <label class="range layer-morph" hidden title="Предварительное сжатие маски слоя, px">⊖₁ <input id="layerPreErode" type="range" min="0" max="24" step="1" value="2"><input id="layerPreErodeNum"
          class="num" type="number" min="0" max="24" step="1" value="2" aria-label="Предварительное сжатие маски слоя, px"></label>
      <label class="range layer-morph" hidden title="Расширение маски слоя, px">⊕ <input id="layerDilate" type="range" min="0" max="24" step="1" value="6"><input id="layerDilateNum"
          class="num" type="number" min="0" max="24" step="1" value="6" aria-label="Расширение маски слоя, px"></label>
      <label class="range layer-morph" hidden title="Размытие маски слоя, px">≈ <input id="layerBlur" type="range" min="0" max="24" step="1" value="4"><input id="layerBlurNum"
          class="num" type="number" min="0" max="24" step="1" value="4" aria-label="Размытие маски слоя, px"></label>
      <label class="range layer-morph" hidden title="Сжатие маски слоя, px">⊖ <input id="layerErode" type="range" min="0" max="24" step="1" value="4"><input id="layerErodeNum"
          class="num" type="number" min="0" max="24" step="1" value="4" aria-label="Сжатие маски слоя, px"></label>
      <label class="range">↔ <input id="period" type="range" min="1" max="720" step="1" value="90"><input id="periodNum"
          class="num" type="number" step="1" value="90"></label>
      <a class="github-link" href="https://github.com/mrfeod/stogram" target="_blank" rel="noopener noreferrer">GitHub</a>
    </header>
    <main>
      <section id="stage">
        <canvas id="view"></canvas>
        <canvas id="depthView"></canvas>
        <canvas id="transitionView" aria-hidden="true"></canvas>
        <button id="downloadDepth" hidden aria-label="Скачать карту глубины PNG">PNG</button>
        <div id="meshDownloads">
          <button id="downloadStl" aria-label="Скачать меш STL">STL</button>
        </div>
        <div id="layerDownloads" hidden>
          <button id="layersFullscreen" aria-label="Открыть слои на весь экран"
              title="На весь экран">⛶</button>
        </div>
        <details id="skySettings" class="floating-settings" hidden open>
          <summary>Фон</summary>
          <div class="floating-settings-panel" hidden>
            <label class="range">Blur <input id="skyBlur" type="range" min="0" max="8" step="0.1" value="8"><input id="skyBlurNum"
                class="num" type="number" min="0" max="8" step="0.1" value="5"></label>
            <label class="range">Яркость <input id="skyBrightness" type="range" min="0" max="1" step="0.01" value="0.9"><input id="skyBrightnessNum" class="num" type="number" min="0" max="1" step="0.01" value="0.9"></label>
            <label class="range">Насыщенность <input id="skySaturation" type="range" min="0" max="1.5" step="0.01" value="0.9"><input id="skySaturationNum" class="num" type="number" min="0" max="1.5" step="0.01" value="0.9"></label>
            <label class="range">Виньетка <input id="skyVignette" type="range" min="0" max="0.8" step="0.01" value="0.25"><input id="skyVignetteNum" class="num" type="number" min="0" max="0.8" step="0.01" value="0.25"></label>
            <label class="range">Yaw parallax <input id="skyYawParallax" type="range" min="0" max="1" step="0.01" value="0.28"><input id="skyYawParallaxNum" class="num" type="number" min="0" max="1" step="0.01" value="0.28"></label>
            <label class="range">Pitch parallax <input id="skyPitchParallax" type="range" min="0" max="1" step="0.01" value="0.22"><input id="skyPitchParallaxNum" class="num" type="number" min="0" max="1" step="0.01" value="0.22"></label>
          </div>
        </details>
        <div id="progressOverlay" hidden>
          <div id="progressText">0%</div>
          <div class="progressTrack">
            <div id="progressBar" class="progressFill"></div>
          </div>
        </div>
        <div id="drop"><div><strong>＋</strong></div></div>
        <img id="thumb" hidden alt="Исходная стереограмма" role="button" tabindex="0" aria-label="Открыть стереограмму на весь экран" aria-expanded="false">
      </section>
      <aside id="settingsSidebar" hidden>
        <details id="cameraSettings" class="settings" hidden>
          <summary>Камера</summary>
          <div class="settings-panel">
            <label class="range">Yaw <input id="cameraYaw" type="range" min="-180" max="180" step="1" value="-13"><input id="cameraYawNum" class="num" type="number" min="-180" max="180" step="1" value="-13"></label>
            <label class="range">Pitch <input id="cameraPitch" type="range" min="-80" max="80" step="1" value="-9"><input id="cameraPitchNum" class="num" type="number" min="-80" max="80" step="1" value="-9"></label>
            <label class="range">Zoom <input id="cameraZoom" type="range" min="0.1" max="10" step="0.05" value="1"><input id="cameraZoomNum" class="num" type="number" min="0.1" max="10" step="0.05" value="1"></label>
            <label class="range">FOV <input id="cameraFov" type="range" min="5" max="100" step="1" value="45"><input id="cameraFovNum" class="num" type="number" min="5" max="100" step="1" value="45"></label>
            <label class="range">Distance <input id="cameraDistance" type="range" min="1.2" max="20" step="0.1" value="3.2"><input id="cameraDistanceNum" class="num" type="number" min="1.2" max="20" step="0.1" value="3.2"></label>
            <label class="check"><input id="layersOrthographic" type="checkbox"> Ортографическая камера для слоёв</label>
          </div>
        </details>
        <details id="dofSettings" class="settings" hidden open>
          <summary>DoF</summary>
          <div class="settings-panel">
            <label class="range">Фокус <input id="dofFocus" type="range" min="1" max="8" step="1" value="2"><input id="dofFocusNum" class="num" type="number" min="1" max="8" step="1" value="2"></label>
            <label class="range">Радиус <input id="dofBlur" type="range" min="0" max="16" step="0.1" value="1"><input id="dofBlurNum" class="num" type="number" min="0" max="16" step="0.1" value="1"></label>
            <label class="range">Zoom comp <input id="dofZoomComp" type="range" min="0" max="2" step="0.05" value="0.7"><input id="dofZoomCompNum" class="num" type="number" min="0" max="2" step="0.05" value="0.7"></label>
            <label class="range">Кривая <input id="dofRate" type="range" min="0.1" max="20" step="0.1" value="2"><input id="dofRateNum" class="num" type="number" min="0.1" max="20" step="0.1" value="2"></label>
            <label class="range">Степень <input id="dofPower" type="range" min="0.25" max="4" step="0.05" value="1.5"><input id="dofPowerNum" class="num" type="number" min="0.25" max="4" step="0.05" value="1.5"></label>
            <label class="range">Sigma <input id="dofSigma" type="range" min="0.1" max="2" step="0.05" value="1"><input id="dofSigmaNum" class="num" type="number" min="0.1" max="2" step="0.05" value="1"></label>
            <label class="range">Sigma min <input id="dofSigmaMin" type="range" min="0.1" max="2" step="0.05" value="1"><input id="dofSigmaMinNum" class="num" type="number" min="0.1" max="2" step="0.05" value="1"></label>
            <label class="range">Граница <input id="dofDepthFalloff" type="range" min="0" max="200" step="1" value="55"><input id="dofDepthFalloffNum" class="num" type="number" min="0" max="200" step="1" value="55"></label>
            <label class="range">Mix start <input id="dofMixStart" type="range" min="0" max="2" step="0.05" value="0.15"><input id="dofMixStartNum" class="num" type="number" min="0" max="2" step="0.05" value="0.15"></label>
            <label class="range">Mix full <input id="dofMixEnd" type="range" min="0.1" max="4" step="0.05" value="0.1"><input id="dofMixEndNum" class="num" type="number" min="0.1" max="4" step="0.05" value="0.1"></label>
          </div>
        </details>
      </aside>
    </main>
  </div>
  <script type="module" src="src/app.js"></script>
</body>

</html>
