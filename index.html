<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <title>Stogram: Stereogram Viewer</title>
  <meta name="description" content="Reconstruct depth maps from autostereograms and explore them as 3D surfaces or layers.">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Stogram: Stereogram Viewer">
  <meta property="og:description" content="Reconstruct depth maps from autostereograms and explore them as 3D surfaces or layers.">
  <meta property="og:url" content="https://mrfeod.github.io/stogram/">
  <meta property="og:image" content="https://mrfeod.github.io/stogram/src/social-preview.png">
  <meta property="og:image:width" content="1280">
  <meta property="og:image:height" content="640">
  <meta property="og:image:alt" content="Stogram stereogram depth reconstruction and 3D viewer">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Stogram: Stereogram Viewer">
  <meta name="twitter:description" content="Reconstruct depth maps from autostereograms and explore them as 3D surfaces or layers.">
  <meta name="twitter:image" content="https://mrfeod.github.io/stogram/src/social-preview.png">
  <link rel="icon" href="src/favicon/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="32x32" href="src/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="src/favicon/favicon-16x16.png">
  <link rel="apple-touch-icon" sizes="180x180" href="src/favicon/apple-touch-icon.png">
  <link rel="manifest" href="src/favicon/site.webmanifest">
  <meta name="theme-color" content="#101114">
  <link rel="stylesheet" href="src/styles.css">
</head>

<body>
  <div id="app">
    <header>
      <label id="sourceButton" class="file">＋<input id="file" type="file" accept="image/*"></label>
      <label id="textureButton" class="file">▧<input id="textureFile" type="file" accept="image/*"></label>
      <button id="analyze">↻</button>
      <button id="reset">⊕</button>
      <button id="auto">▶</button>

      <div class="seg">
        <label><input type="radio" name="shape" value="1" checked><span>◠</span></label>
        <label><input type="radio" name="shape" value="-1"><span>◡</span></label>
      </div>

      <div class="seg">
        <label><input type="radio" name="viewmode" value="surface" checked><span>❍</span></label>
        <label><input type="radio" name="viewmode" value="layers"><span>≡</span></label>
        <label><input type="radio" name="viewmode" value="depthmap"><span>◩</span></label>
      </div>

      <label class="range">↕︎ <input id="depth" type="range" min="0" max="220" step="1" value="35"><input id="depthNum"
          class="num" type="number" step="1" value="35"></label>
      <label class="range">≡ <input id="layers" type="range" min="2" max="12" step="1" value="5"><input id="layersNum"
          class="num" type="number" step="1" value="5"></label>
      <label class="range">↔ <input id="period" type="range" min="1" max="720" step="1" value="90"><input id="periodNum"
          class="num" type="number" step="1" value="90"></label>
      <a class="github-link" href="https://github.com/mrfeod/stogram" target="_blank" rel="noopener noreferrer">GitHub</a>
    </header>
    <main>
      <canvas id="view"></canvas>
      <canvas id="depthView"></canvas>
      <div id="progressOverlay" hidden>
        <div id="progressText">0%</div>
        <div class="progressTrack">
          <div id="progressBar" class="progressFill"></div>
        </div>
      </div>
      <div id="drop">
        <div><strong>＋</strong></div>
      </div>
      <img id="thumb" hidden alt="Исходная стереограмма" role="button" tabindex="0" aria-label="Открыть стереограмму на весь экран" aria-expanded="false">
    </main>
  </div>
  <script type="module" src="src/app.js"></script>
</body>

</html>
